{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 pt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body p-5 text-center">
                    <i class="fa fa-exclamation-triangle mb-3" style="font-size: 3rem; color: #dc3545;"></i>
                    <h2 style="font-family: 'Urbanist', sans-serif; font-weight: 700;">ELIMINAR NOTICIA</h2>
                    <p class="text-muted mt-3">
                        ¿Estás seguro de que deseas eliminar la noticia <strong>"{{ object.title }}"</strong>?
                    </p>
                    <p class="text-danger small">
                        <i class="fa fa-info-circle me-1"></i>
                        Esta acción eliminará el archivo .md del sitio Hugo y no se puede deshacer.
                    </p>

                    <div class="mt-4">
                        <form method="post" class="d-inline">
                            {% csrf_token %}
                            <button type="button" class="btn btn-lg px-5 shadow-sm me-2"
                                onclick="window.location.href='{% url 'hugo_noticia_list' %}'">Cancelar</button>
                            <button type="submit" class="btn btn-danger btn-lg px-5 shadow-sm">
                                <i class="fa fa-trash me-2"></i> Sí, Eliminar
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
