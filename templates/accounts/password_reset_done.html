{% extends "base.html" %}

{% block content %}
<div class="container ac-page ac-page--narrow ac-container ac-container--center">
    <div class="ac-icon ac-icon--info">
        <i class="fa fa-envelope"></i>
    </div>
    <h3 class="ac-title">Correo enviado</h3>
    <p class="ac-text-muted">
        Si existe una cuenta con el correo electrónico ingresado, recibirás las instrucciones para restablecer tu contraseña.
    </p>
    <p class="ac-text-light">
        Si no recibes el correo en unos minutos, revisa tu carpeta de spam.
    </p>
    <hr>
    <a href="/login/" class="btn ac-btn-primary">Volver al login</a>
</div>
{% endblock %}
