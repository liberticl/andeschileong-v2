{% extends "base.html" %}

{% block content %}
<div class="container ac-page ac-page--narrow ac-container">
    <h3 class="ac-title ac-title--center">Activar Cuenta</h3>
    <hr>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
        {% endif %}
        <div class="mb-3">
            <label for="id_password" class="form-label">Contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="id_password_confirm" class="form-label">Confirmar contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password_confirm" id="id_password_confirm" class="form-control" required>
        </div>
        <div class="ac-btn-group" style="justify-content: center;">
            <button type="submit" class="btn ac-btn-primary">Activar cuenta</button>
        </div>
    </form>
</div>
{% endblock %}
