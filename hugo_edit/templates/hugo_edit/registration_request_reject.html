{% extends "base.html" %}

{% block content %}
<div class="container mt-5 pt-5 mb-5" style="max-width: 600px;">
    <h3 class="ac-title ac-title--danger">Rechazar Solicitud</h3>
    <hr>
    <p>Solicitud de: <strong>{{ request_obj.first_name }} {{ request_obj.last_name }}</strong> ({{ request_obj.email }})</p>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label for="id_reason" class="form-label">Motivo del rechazo</label>
            <textarea name="reason" id="id_reason" class="form-control" rows="4"
                      placeholder="Indica el motivo del rechazo...">{{ form.reason.value|default:'' }}</textarea>
        </div>
        <div class="ac-btn-group">
            <button type="submit" class="btn ac-btn-danger">Rechazar solicitud</button>
            <a href="{% url 'hugo_registration_request_detail' request_obj.pk %}" class="btn btn-outline-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
