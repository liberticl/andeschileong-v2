{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 60px; margin-bottom: 60px; z-index: 10; position: relative; background-color: #ffffffdd; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h3 style="text-align: center; color: #2241a8;"><b>Restablecer Contraseña</b></h3>
    <hr>
    <p style="color: #555; text-align: center;">
        Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
    </p>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
        {% endif %}
        <div class="mb-3">
            <label for="id_email" class="form-label">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" name="email" id="id_email" class="form-control" required
                   placeholder="tu@correo.com">
        </div>
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary">Enviar instrucciones</button>
        </div>
    </form>
    <div style="text-align: center; margin-top: 15px;">
        <a href="/login/" style="color: #2241a8;">Volver al login</a>
    </div>
</div>
{% endblock %}
