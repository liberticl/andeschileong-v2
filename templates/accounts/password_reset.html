{% extends "base.html" %}

{% block content %}
<div class="container ac-page ac-page--narrow ac-container">
    <h3 class="ac-title ac-title--center">Restablecer Contraseña</h3>
    <hr>
    <p class="ac-text-muted" style="text-align: center;">
        Ingresa tu correo electrónico y te enviaremos las instrucciones para restablecer tu contraseña.
    </p>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
        {% endif %}
        <div class="mb-3">
            <label for="id_email" class="form-label">Correo electrónico <span class="text-danger">*</span></label>
            <input type="email" name="email" id="id_email" class="form-control" required
                   placeholder="tu@correo.com">
        </div>
        <div class="ac-btn-group" style="justify-content: center;">
            <button type="submit" class="btn ac-btn-primary">Enviar instrucciones</button>
        </div>
    </form>
    <div class="ac-btn-group" style="justify-content: center; margin-top: 15px;">
        <a href="/login/" class="ac-back-link">Volver al login</a>
    </div>
</div>
{% endblock %}
