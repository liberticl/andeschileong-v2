{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 60px; margin-bottom: 60px; z-index: 10; position: relative; background-color: #ffffffdd; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); text-align: center;">
    <div style="font-size: 48px; color: #2241a8; margin-bottom: 16px;">
        <i class="fa fa-envelope"></i>
    </div>
    <h3 style="color: #2241a8;"><b>Correo enviado</b></h3>
    <p style="color: #555; font-size: 16px; margin-top: 20px;">
        Si existe una cuenta con el correo electrónico ingresado, recibirás las instrucciones para restablecer tu contraseña.
    </p>
    <p style="color: #999; font-size: 13px;">
        Si no recibes el correo en unos minutos, revisa tu carpeta de spam.
    </p>
    <hr>
    <a href="/login/" class="btn btn-primary">Volver al login</a>
</div>
{% endblock %}
