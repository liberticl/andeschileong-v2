{% extends "base.html" %}

{% block content %}
<div class="container" style="max-width: 500px; margin-top: 60px; margin-bottom: 60px; z-index: 10; position: relative; background-color: #ffffffdd; border-radius: 8px; padding: 32px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
    <h3 style="text-align: center; color: #2241a8;"><b>Activar Cuenta</b></h3>
    <hr>
    <form method="post">
        {% csrf_token %}
        {% if form.errors %}
        <div class="alert alert-danger">
            {{ form.errors }}
        </div>
        {% endif %}
        <div class="mb-3">
            <label for="id_password" class="form-label">Contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password" id="id_password" class="form-control" required>
        </div>
        <div class="mb-3">
            <label for="id_password_confirm" class="form-label">Confirmar contraseña <span class="text-danger">*</span></label>
            <input type="password" name="password_confirm" id="id_password_confirm" class="form-control" required>
        </div>
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary">Activar cuenta</button>
        </div>
    </form>
</div>
{% endblock %}
